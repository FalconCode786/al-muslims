{% extends "base.html" %}

{% block title %}Register - Almuslim{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full" data-aos="fade-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-6 relative">
                <div class="absolute inset-0 bg-red-500/20 rounded-full blur-xl"></div>
                <div class="relative w-20 h-20 bg-navy-900 rounded-2xl flex items-center justify-center border-2 border-red-500/50">
                    <i data-lucide="user-plus" class="h-10 w-10 text-red-500"></i>
                </div>
            </div>
            <h2 class="text-3xl font-bold text-navy-900">Create Account</h2>
            <p class="mt-2 text-gray-600">Start managing your energy with Almuslim</p>
        </div>
        
        <!-- Register Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100 hover-lift">
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">
                        Full Name
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-gray-400 group-focus-within:text-red-500 transition"></i>
                        </div>
                        <input id="full_name" name="full_name" type="text" required
                               class="block w-full pl-12 pr-4 py-3.5 border border-gray-300 rounded-2xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                               placeholder="Muhammad Ali">
                    </div>
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400 group-focus-within:text-red-500 transition"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                               class="block w-full pl-12 pr-4 py-3.5 border border-gray-300 rounded-2xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                               placeholder="you@example.com">
                    </div>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400 group-focus-within:text-red-500 transition"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                               class="block w-full pl-12 pr-4 py-3.5 border border-gray-300 rounded-2xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                               placeholder="Min. 8 characters">
                    </div>
                    <p class="mt-1 text-xs text-gray-500">Must contain uppercase, lowercase, and numbers</p>
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">
                        Confirm Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400 group-focus-within:text-red-500 transition"></i>
                        </div>
                        <input id="confirm_password" name="confirm_password" type="password" required
                               class="block w-full pl-12 pr-4 py-3.5 border border-gray-300 rounded-2xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                               placeholder="Re-enter your password">
                    </div>
                </div>

                <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-2xl shadow-sm text-white bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 font-semibold transition-all duration-300 hover:shadow-lg magnetic-btn ripple mt-6">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="font-medium text-red-600 hover:text-red-500 transition">
                        Sign in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
